<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Darul Sakina — Community Portal</title>
<style>
 body{font-family:system-ui,sans-serif;max-width:900px;margin:2rem auto;padding:0 1rem;color:#1a1a1a}
 h1{color:#0b5;}.card{border:1px solid #ddd;border-radius:12px;padding:1rem;margin:.75rem 0}
 .grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
 button{background:#0b5;color:#fff;border:0;padding:.5rem 1rem;border-radius:8px;cursor:pointer}
 input,select,textarea{width:100%;padding:.5rem;margin:.25rem 0 .75rem;border:1px solid #ccc;border-radius:8px}
</style></head><body>
<h1>🕌 Darul Sakina</h1>
<p>Community & faith portal — events, prayer times, donations, volunteers.</p>
<div class="grid">
  <div class="card"><h3>Prayer times</h3><div id="prayer">Loading…</div></div>
  <div class="card"><h3>Announcements</h3><div id="ann">…</div></div>
</div>
<div class="card"><h3>Upcoming events</h3><div id="events"></div></div>
<div class="card"><h3>Donate</h3>
  <input id="dname" placeholder="Name"/><input id="damt" type="number" placeholder="Amount PKR"/>
  <button onclick="donate()">Give</button><span id="dmsg"></span>
</div>
<script>
async function j(u,o){const r=await fetch(u,o);return r.json()}
async function load(){
  const p=await j('/api/prayer-times?city=Karachi');
  document.getElementById('prayer').innerHTML=Object.entries(p.times).map(([k,v])=>`<div><b>${k}</b>: ${v}</div>`).join('');
  const a=await j('/api/announcements');
  document.getElementById('ann').innerHTML=a.announcements.map(x=>`<div><b>${x.title}</b><br/><small>${x.body}</small></div>`).join('')||'None';
  const e=await j('/api/events');
  document.getElementById('events').innerHTML=e.events.map(x=>`<div class="card"><b>${x.title}</b> — ${x.date} ${x.time}<br/>${x.location} · RSVP ${x.rsvp}/${x.capacity}
  <button onclick="rsvp('${x.id}')">RSVP</button></div>`).join('');
}
async function rsvp(id){await j('/api/events/'+id+'/rsvp',{method:'POST'});load()}
async function donate(){
  const r=await j('/api/donations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:dname.value,amount_pkr:+damt.value,method:'bank'})});
  dmsg.textContent=r.ok?(' Receipt '+r.receipt):r.error;
  load();
}
load();
</script>
</body></html>
